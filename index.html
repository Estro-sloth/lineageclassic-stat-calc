<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>틀래식 축/저주캐 판독기 v1.9</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --ss-text: #ffffff; --s-text: #ff3b3b; --a-text: #ffeb3b;
            --b-text: #4caf50; --c-text: #2196f3; --d-text: #9c27b0;
            --f-text: #000000;
            --glow-ss: #ffd700; --glow-s: #ffcc00; --glow-a: #fff8dc;
            --glow-b: #ffffff;
            --glow-c: #ffc1c1; --glow-d: #ff8080; --glow-f: #ff0000;
            --gold-main: #ffca28;
        }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1c20; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .main-wrapper { display: grid; grid-template-columns: 360px 1fr; gap: 20px; width: 100%; max-width: 1200px; }
        .input-side { background: #2c2f36; padding: 18px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); height: fit-content; }
        .report-side { display: flex; flex-direction: column; gap: 15px; padding: 5px; border-radius: 20px; background: #1a1c20; }
        .title-area { margin-bottom: 20px; text-align: right; padding-right: 5px; }
        .main-title { color: var(--gold-main); margin: 0; font-size: 26px; font-weight: 900; text-align: center; display: block; }
        .version { font-size: 14px; color: #fff; font-weight: bold; display: block; margin-top: 5px; }
        .author-top { font-size: 10px; color: #666; font-weight: normal; display: block; margin-top: 2px; }
        
        .class-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 20px; }
        .class-btn { background: #3d414a; color: #aaa; border: 1px solid #555; padding: 10px 0; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .class-btn.active { background: var(--gold-main); color: #000; border-color: #fff; box-shadow: 0 0 10px rgba(255, 202, 40, 0.4); }

        .aura-ss { text-shadow: 0 0 2px #000, 0 0 8px var(--glow-ss), 0 0 15px var(--glow-ss); color: var(--ss-text); }
        .aura-s { text-shadow: 0 0 2px #000, 0 0 6px var(--glow-s), 0 0 10px var(--glow-s); color: var(--s-text); }
        .aura-a { text-shadow: 0 0 2px #000, 0 0 4px var(--glow-a); color: var(--a-text); }
        .aura-b { text-shadow: 0 0 2px #000, 0 0 4px var(--glow-b); color: var(--b-text); }
        .aura-c { text-shadow: 0 0 2px #000, 0 0 4px var(--glow-c); color: var(--c-text); }
        .aura-d { text-shadow: 0 0 2px #000, 0 0 6px var(--glow-d), 0 0 10px var(--glow-d); color: var(--d-text); }
        .aura-f { text-shadow: 0 0 1px #fff, 0 0 8px var(--glow-f), 0 0 15px var(--glow-f); color: var(--f-text); }

        .grade-guide { display: flex; gap: 4px; background: #2c2f36; padding: 10px 5px; border-radius: 15px; border: 1px solid #444; width: 100%; box-sizing: border-box; }
        .guide-item { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px 2px; border: 1px solid rgba(255,255,255,0.05); text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .w-ss, .w-f { flex: 10; } .w-s, .w-d { flex: 13; } .w-a, .w-c { flex: 16; } .w-b { flex: 22; }
        .g-name { font-size: 18px; font-weight: 900; display: block; }
        .g-range { font-size: 9px; opacity: 0.5; display: block; }
        .g-desc { font-size: 13px; font-weight: bold; display: block; margin-top: 2px; }

        .tip-box { background: rgba(255,202,40,0.05); border: 1px dashed rgba(255,202,40,0.3); padding: 12px; border-radius: 12px; font-size: 12px; }
        .stat-section { background: #343842; padding: 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #444; }
        .limit-info { font-size: 13px; color: var(--gold-main); font-weight: bold; background: #1a1c20; padding: 4px 10px; border-radius: 5px; float: right; border: 1px solid var(--gold-main); }
        .stat-row { display: grid; grid-template-columns: 80px 1fr 80px; gap: 6px; align-items: center; margin-bottom: 10px; clear: both; }
        label { font-size: 12px; color: #aaa; margin-bottom: 3px; display: block; font-weight: bold; text-align: center; }
        .sub-input { padding: 8px; border: 1px solid #555; border-radius: 6px; background: #3d414a; color: #fff; font-size: 18px; width: 100%; box-sizing: border-box; text-align: center !important; font-weight: bold; }
        .stepper { display: flex; align-items: center; background: #4a4e57; border-radius: 6px; height: 40px; }
        .stepper button { width: 35px; height: 100%; background: #5a5e67; color: white; border: none; font-size: 18px; cursor: pointer; }
        .stepper input { flex: 1; width: 25px; border: none; background: transparent; color: white; text-align: center !important; font-size: 20px; font-weight: bold; }
        input:disabled { background: #212429; color: var(--gold-main); text-align: center !important; font-size: 18px; border-radius: 6px; border: 1px solid #222; padding: 6px 0; font-weight: bold; width: 100%; }

        /* 경고문 스타일 복구 */
        .disclaimer { font-size: 11px; color: var(--gold-main); text-align: center; margin-bottom: 12px; font-weight: bold; line-height: 1.4; }

        .results-area { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; display: none; }
        .grade-card { background: #2c2f36; padding: 20px; border-radius: 20px; text-align: center; border-bottom: 10px solid #444; }
        .grade-val { font-size: 80px; font-weight: 900; margin-top: 5px; line-height: 1; }
        .grade-comment { font-size: 28px; font-weight: bold; margin-bottom: 15px; opacity: 0.9; }
        .grade-info { font-size: 13px; color: #aaa; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }

        .main-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #ffca28, #ffa000); color: #000; border: none; border-radius: 10px; font-size: 19px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .save-btn { width: 100%; padding: 12px; background: #444; color: #fff; border: 1px solid #666; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="input-side">
        <div class="title-area">
            <span class="main-title">틀래식 축/저주캐 판독기</span>
            <span class="version">v1.0</span>
            <span class="author-top">제작: Gemini, 에겐섭 멀린</span>
        </div>

        <div class="class-selector">
            <button class="class-btn active" onclick="selectClass('prince', this)">군주</button>
            <button class="class-btn" onclick="selectClass('knight', this)">기사</button>
            <button class="class-btn" onclick="selectClass('elf', this)">요정</button>
            <button class="class-btn" onclick="selectClass('wizard', this)">마법사</button>
        </div>
        
        <div class="stat-section">
            <div id="limitText" class="limit-info">추가 스탯: 0 / 0</div>
            <div style="clear:both; height:8px;"></div>
            <div class="stat-row">
                <div><label>기본 CON</label><input id="bCon" disabled></div>
                <div><label>추가 투자</label><div class="stepper"><button onclick="step('pCon', -1)">-</button><input type="number" id="pCon" value="0" readonly><button onclick="step('pCon', 1)">+</button></div></div>
                <div><label>최종 CON</label><input id="tCon" disabled></div>
            </div>
            <div class="stat-row">
                <div><label>기본 WIS</label><input id="bWis" disabled></div>
                <div><label>추가 투자</label><div class="stepper"><button onclick="step('pWis', -1)">-</button><input type="number" id="pWis" value="0" readonly><button onclick="step('pWis', 1)">+</button></div></div>
                <div><label>최종 WIS</label><input id="tWis" disabled></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 15px;">
            <div><label>레벨</label><input type="number" id="lv" value="1" class="sub-input"></div>
            <div><label>HP</label><input type="number" id="chp" value="0" class="sub-input"></div>
            <div><label>MP</label><input type="number" id="cmp" value="0" class="sub-input"></div>
        </div>

        <div class="disclaimer">⚠️ 장비 및 버프를 제외한 '순수' 스탯 수치를 입력해 주세요.</div>

        <button class="main-btn" onclick="calc()">내 등급 확인하기</button>
        <button id="saveBtn" class="save-btn" onclick="saveAsImage()">📷공유용 이미지 저장</button>
    </div>

    <div class="report-side" id="captureArea">
        <div class="grade-guide">
            <div class="guide-item w-ss"><span class="g-name aura-ss">SS</span><span class="g-range">0~5%</span><span class="g-desc aura-ss">으뜸</span></div>
            <div class="guide-item w-s"><span class="g-name aura-s">S</span><span class="g-range">~17%</span><span class="g-desc aura-s">축캐</span></div>
            <div class="guide-item w-a"><span class="g-name aura-a">A</span><span class="g-range">~35%</span><span class="g-desc aura-a">좋음</span></div>
            <div class="guide-item w-b"><span class="g-name aura-b">B</span><span class="g-range">~65%</span><span class="g-desc aura-b">보통</span></div>
            <div class="guide-item w-c"><span class="g-name aura-c">C</span><span class="g-range">~83%</span><span class="g-desc aura-c">구림</span></div>
            <div class="guide-item w-d"><span class="g-name aura-d">D</span><span class="g-range">~95%</span><span class="g-desc aura-d">저주</span></div>
            <div class="guide-item w-f"><span class="g-name aura-f">F</span><span class="g-range">~100%</span><span class="g-desc aura-f">역으뜸</span></div>
        </div>
        <div class="tip-box">
            <strong style="color: var(--gold-main); display: block; margin-bottom: 5px;">💡 판독기 이용 팁</strong>
            • <b>5렙 축캐런 가이드:</b> HP/MP <b>S 이상</b>이면 걍 ㄱ!<br>
            • 등급은 통계적 참고용일 뿐, 재미로만 봐주세요. 과몰입 금지!
        </div>
        <div id="resArea" class="results-area">
            <div id="hpCard" class="grade-card"><div style="font-size:14px; font-weight:bold; color:#aaa;">HP 성장도</div><div id="hpG" class="grade-val">-</div><div id="hpC" class="grade-comment">-</div><div id="hpD" class="grade-info"></div></div>
            <div id="mpCard" class="grade-card"><div style="font-size:14px; font-weight:bold; color:#aaa;">MP 성장도</div><div id="mpG" class="grade-val">-</div><div id="mpC" class="grade-comment">-</div><div id="mpD" class="grade-info"></div></div>
        </div>
    </div>
</div>

<script>
let currentClass = 'prince';
const baseData = { prince: { c: 10, w: 11, hp: 14, mp: 2, bonus: 8 }, knight: { c: 14, w: 9, hp: 16, mp: 1, bonus: 4 }, elf: { c: 12, w: 12, hp: 15, mp: 4, bonus: 7 }, wizard: { c: 12, w: 12, hp: 12, mp: 4, bonus: 16 } };
const gradeComments = { "SS": "으뜸", "S": "축캐", "A": "좋음", "B": "보통", "C": "구림", "D": "저주", "F": "역으뜸" };
const gradeStyles = { "SS": "aura-ss", "S": "aura-s", "A": "aura-a", "B": "aura-b", "C": "aura-c", "D": "aura-d", "F": "aura-f" };
const textColors = { "SS":"#ffffff", "S":"#ff3b3b", "A":"#ffeb3b", "B":"#4caf50", "C":"#2196f3", "D":"#9c27b0", "F":"#000000" };
function selectClass(cls, btn) { currentClass = cls; document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); sync(); }
function sync() { const d = baseData[currentClass]; document.getElementById('bCon').value = d.c; document.getElementById('bWis').value = d.w; document.getElementById('pCon').value = 0; document.getElementById('pWis').value = 0; sum(); }
function step(id, val) { const el = document.getElementById(id); el.value = (parseInt(el.value) || 0) + val; sum(id); }
function sum(changedId) { const d = baseData[currentClass]; const pcIn = document.getElementById('pCon'), pwIn = document.getElementById('pWis'); let pc = parseInt(pcIn.value) || 0, pw = parseInt(pwIn.value) || 0; if(pc < 0) pc = 0; if(pw < 0) pw = 0; if(d.c + pc > 18) pc = 18 - d.c; if(d.w + pw > 18) pw = 18 - d.w; if(pc + pw > d.bonus) { if(changedId === 'pCon') pc = d.bonus - pw; else pw = d.bonus - pc; } pcIn.value = pc; pwIn.value = pw; document.getElementById('tCon').value = d.c + pc; document.getElementById('tWis').value = d.w + pw; document.getElementById('limitText').innerText = `추가 스탯: ${pc + pw} / ${d.bonus}`; }
function erf(x) { const a = [0.254829592, -0.284496736, 1.421413741, -1.453152027, 1.061405429], p = 0.3275911; const sign = x < 0 ? -1 : 1; x = Math.abs(x); const t = 1.0 / (1.0 + p * x); return sign * (1.0 - (((((a[4]*t + a[3])*t + a[2])*t + a[1])*t + a[0])*t * Math.exp(-x*x))); }
function getGrade(top) { if(top <= 5) return "SS"; if(top <= 17) return "S"; if(top <= 35) return "A"; if(top <= 65) return "B"; if(top <= 83) return "C"; if(top <= 95) return "D"; return "F"; }
function calc() {
    const con = parseInt(document.getElementById('tCon').value), wis = parseInt(document.getElementById('tWis').value);
    const lv = (parseInt(document.getElementById('lv').value) || 1) - 1;
    const curH = parseInt(document.getElementById('chp').value) || 0, curM = parseInt(document.getElementById('cmp').value) || 0;
    const process = (cur, start, mi, ma, level) => {
        const avg = start + (level * (mi + ma) / 2);
        const stdDev = Math.sqrt(level * (Math.pow(ma - mi + 1, 2) - 1) / 12);
        const z = (cur - avg) / (stdDev || 1);
        const top = (1 - (0.5 * (1 + erf(z / Math.sqrt(2))))) * 100;
        const g = getGrade(top);
        return { g, comm: gradeComments[g], df: (cur - avg).toFixed(1), top: top.toFixed(1), avg: avg.toFixed(1) };
    };
    const d = baseData[currentClass]; const cb = Math.max(0, con - 15);
    const hRes = process(curH, d.hp, (currentClass==='knight'?6:(currentClass==='wizard'?3:5))+cb, (currentClass==='knight'?12:(currentClass==='wizard'?6:10))+cb, lv);
    let mMin, mMax;
    if(currentClass==='knight') { mMin=0; mMax=(wis>=10?3:2); } else if(currentClass==='elf') { if(wis<=11){mMin=3;mMax=4;} else if(wis<=14){mMin=3;mMax=6;} else if(wis<=17){mMin=4;mMax=7;} else{mMin=4;mMax=9;} } else if(currentClass==='wizard') { if(wis<=14){mMin=4;mMax=8;} else if(wis==15){mMin=6;mMax=10;} else if(wis==16){mMin=6;mMax=11;} else if(wis==17){mMin=7;mMax=11;} else{mMin=7;mMax=12;} } else { if(wis<=10){mMin=2;mMax=3;} else if(wis<=14){mMin=2;mMax=4;} else if(wis<=17){mMin=3;mMax=5;} else{mMin=3;mMax=6;} }
    const mRes = process(curM, d.mp, mMin, mMax, lv);
    document.getElementById('resArea').style.display = 'grid'; document.getElementById('saveBtn').style.display = 'block';
    const set = (id, r) => {
        const card = document.getElementById(id+'Card'); const valEl = document.getElementById(id+'G');
        card.className = 'grade-card ' + r.g; card.style.borderBottomColor = textColors[r.g];
        valEl.innerText = r.g; valEl.style.color = textColors[r.g];
        valEl.className = 'grade-val ' + gradeStyles[r.g];
        document.getElementById(id+'C').innerText = r.comm; document.getElementById(id+'C').className = 'grade-comment ' + gradeStyles[r.g];
        document.getElementById(id+'D').innerHTML = `상위 <b>${r.top}%</b> (평균 ${r.avg})<br>평균대비 ${r.df > 0 ? '+' : ''}${r.df}`;
    };
    set('hp', hRes); set('mp', mRes);
}
function saveAsImage() { const area = document.getElementById('captureArea'); html2canvas(area, { backgroundColor: '#1a1c20', scale: 2 }).then(canvas => { const link = document.createElement('a'); link.download = '틀래식_판독결과.png'; link.href = canvas.toDataURL(); link.click(); }); }
sync();
</script>
</body>
</html>
